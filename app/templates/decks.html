<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- icon -->
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>

    <!-- Rich text editor -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <!-- Katex -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

</head>
<body class="bg-gray-100">
    <script src="/static/decks.js"></script>
    <script>const DECK_ID = {{ deck_id }};</script>


    <nav class="bg-purple-700 border-b px-8 py-4">
        <a href='/' title="Início">
            <iconify-icon
                icon="tabler:home-2-filled"
                width="32"
                class="text-black-500 hover:text-red-500 transition-all"
                style="transition: transform 0.2s; display:inline-block"
                onmouseover="this.style.transform='scale(1.2)'"
                onmouseout="this.style.transform='scale(1)'">
            </iconify-icon>
        </a>
    </nav>

    <div class="px-8 py-6">
        <h1 class="text-3xl font-bold text-gray-800">
            Deck {{ deck_id }}
        </h1>

        <div class="flex gap-3 mt-2 text-sm">
            <span class="bg-gray-200 px-3 py-1 rounded-lg">
                {{cards | length}} cards
            </span>
            <span class="bg-purple-200 px-3 py-1 rounded-lg">
                {{due}} para revisar
            </span>
        </div>
    </div>

    <!-- Botoes -->
    <div class="flex gap-4 px-8 mb-6">

        <!-- Novo card -->
        <div onclick="document.getElementById('modal').classList.remove('hidden')" 
            class="bg-white shadow rounded-xl p-6 
            flex items-center justify-center cursor-pointer hover:scale-105 transition w-20 h-20">
            <iconify-icon
                icon="mage:plus"
                width="30"
                class="text-black transition duration-300 group-hover:text-red-500">
            </iconify-icon>
        </div>

        <!-- Iniciar -->
        <a href='/deck/{{ deck_id }}/cards'
            class="group bg-purple-700 shadow rounded-xl p-6 
            flex items-center justify-center cursor-pointer hover:scale-105 transition w-20 h-20">
            <iconify-icon
                icon="mage:play-fill"
                width="30"
                class="text-black transition duration-300 group-hover:text-red-500">
            </iconify-icon>
        </a>

        <!-- Editar -->
        <button onclick="toggleLista()"
            class="group bg-gray-100 shadow rounded-xl p-6 
            flex items-center justify-center cursor-pointer hover:scale-105 transition w-20 h-20">
            <iconify-icon
                icon="tabler:pencil"
                width="30"
                class="text-black transition duration-300 group-hover:text-red-500">
            </iconify-icon>
        </button>
    </div>


    <div id ="lista" class="hidden p-8">
        <div class="bg-white rounded-xl shadow overflow-hidden"></div>
            <table class="w-full">
                <thead class="bg-gray-100 text-gray-600 text-sm">
                    <tr class="bg-gray-100">
                        <th class="border p-2 text-left">id</th>
                        <th class="border p-2 text-left">Frente</th>
                        <th class="border p-2 text-left">Verso</th>
                        <th class="border p-2 text-left">Editar</th>
                        <th class="border p-2 text-left">Excluir</th>
                    </tr>
                </thead>
                <tbody>
                {% for card in cards %}
                <tr class="hover:bg-gray-200 transition">
                    <td class="border p-2">{{ card["id"]}}</td>
                    <td class="border p-2">{{ card["front"] | safe }}</td>
                    <td class="border p-2 text-gray-600">{{ card["back"] | safe }}</td>
                    <td class="border p-2">
                        <button onclick="abrirEditarCard({{ card['id'] }}, '{{ card['front'] }}', '{{ card['back'] }}')"
                            class="px-2 py-1 rounded-lg">
                            <iconify-icon
                                icon="tabler:pencil"
                                width="20"
                                class="text-black transition duration-300">
                            </iconify-icon>
                        </button>
                    </td>
                    <td class="border p-2">
                        <form action="/deck/{{ deck_id }}/cards/{{ card['id'] }}/delete" onsubmit="confirmarexclusao(event)" method="POST">
                            <button type="submit" 
                                class="px-2 py-1 rounded text-sm">
                                <iconify-icon
                                    icon="mage:trash"
                                    width="20"
                                    class="text-red-500 transition duration-300">
                                </iconify-icon>
                            </button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
                </tbody>
            </table>
        </div>
    </div>


    <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
        <div class="bg-white rounded-lg p-12 w-150">
            <h2 class="font-bold text-xl mb-4">Novo Card</h2>
                <form id="form-novo-card" action="/deck/{{ deck_id }}/cards/new" method="POST" enctype="multipart/form-data">
                    
                    <label class="text-sm text-gray-500 mb-1 block">Frente</label>
                    <div id="editor-front" style="height:100px" class="mb-3"></div>
                    <input type="hidden" name="front" id="front-hidden">

                    <label class="text-sm text-gray-500 mb-1 block">Verso</label>
                    <div id="editor-back" style="height:100px" class="mb-4"></div>
                    <input type="hidden" name="back" id="back-hidden">

                    <label class="border w-full rounded-lg p-4 flex items-center justify-center cursor-pointer hover:bg-gray-100 mb-4">
                        <span class="text-gray-400">Clique para adicionar uma imagem</span>
                        <input type="file" name="front_img" accept="image/*" class="hidden">
                    </label>
                    <p class="text-center text-gray-400 text-sm my-2">ou</p>
                    <input type="text" name="front_img_url" placeholder="URL da imagem" class="border w-full p-2 rounded mb-3">
                    <label class="border w-full rounded-lg p-4 flex items-center justify-center cursor-pointer hover:bg-gray-100 mb-4">
                        <span class="text-gray-400">🎵 Clique para adicionar áudio</span>
                        <input type="file" name="front_audio" accept="audio/*" class="hidden">
                    </label>
                    <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded w-full">Criar</button>
                </form>
            <button onclick="document.getElementById('modal').classList.add('hidden')" 
                    class="border w-full mt-2 text-gray-500 w-full text-center">Cancelar</button>
        </div>
    </div>

    <div id="modal-edit-card" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
        <div class="bg-white rounded-lg p-12 w-96">
            <h2 class="font-bold text-xl mb-4">Editar Card</h2>
            <form id="form-edit-card" method="POST">
                <input type="text" id="edit-front" name="front" placeholder="Frente" class="border w-full p-2 rounded mb-3">
                <input type="text" id="edit-back" name="back" placeholder="Verso" class="border w-full p-2 rounded mb-4">
                <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded w-full">Salvar</button>
            </form>
            <button onclick="document.getElementById('modal-edit-card').classList.add('hidden')"
                    class="border w-full mt-2 text-gray-500 text-center">Cancelar</button>
        </div>
    </div>

</body>
</html>
