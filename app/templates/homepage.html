<!DOCTYPE html>
<html lang="pt-br" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="static/images/logo.png">
    <title>Boss Deck</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = {darkMode: 'class'}</script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>

</head>
<body class="bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 transition-colors duration-300">

<nav class="bg-purple-700 dark:bg-gray-900 border-b border-purple-800 dark:border-gray-700 px-8 py-4 flex justify-between items-center">
    <img src="/static/images/logo2.png" alt="Boss Deck" class="h-12 w-12 rounded">
    
    <div class="flex items-center gap-3">
        <button onclick="toggleTheme()" id="btn-theme" 
            class="p-2 rounded-lg border border-purple-500 dark:border-gray-600 text-white">
            🌙
        </button>
        <button class="group" onclick="toggleEdit()" title="Editar">
            <iconify-icon
                icon="line-md:cog"
                width="32"
                class="text-gray-700 dark:text-gray-300 transition duration-300 group-hover:animate-spin">
            </iconify-icon>
        </button>
    </div>
</nav>

    {% if request.args.get('erro') %}
    <div id="toast-erro" 
        class="fixed bottom-6 left-1/2 -translate-x-1/2 
        bg-red-900 text-red-300 border border-red-700 
        px-5 py-4 rounded-xl text-sm flex items-center gap-3 shadow-lg z-50">
        <span>⚠️</span>
        <span>{{ request.args.get('erro') }}</span>
    </div>
    {% endif %}

    <div class="flex items-center justify-center gap-4 p-8">

        <button onclick="scrollCarousel(-1)" class="text-2xl px-2 hover:text-gray-500">
            ‹
        </button>

        <!-- novo baralho -->
        <div onclick="document.getElementById('modal').classList.remove('hidden')" 
            class="border-2 border-dashed rounded-xl flex items-center justify-center cursor-pointer hover:bg-gray-100 flex-shrink-0"
            style="width:180px; height:240px" title="Novo Deck">
                <iconify-icon
                    icon = "line-md:folder-plus-filled"
                    width = "32"
                    class = "text-black">
                </iconify-icon>
        </div>

        <!-- trilho do carrossel -->
        <div class="flex gap-4 overflow-hidden" id="carousel" style="width: 780px">

            <!-- Baralhos -->
            {% for deck in decks %}
            <a href='/deck/{{ deck["id"] }}' 
                class="border rounded-xl p-4 block hover:shadow-lg relative bg-white flex-shrink-0"
                style="width:180px; height:240px">
                <h2 class="font-bold text-lg flex items-center justify-center">
                    {{ deck["name"] }}
                    {% if deck["due"] == 0 %}
                        <iconify-icon
                            icon = "tabler:checkbox"
                            width = "24"
                            style = "color: rgb(4, 172, 4);"
                            class = "text-black">
                        </iconify-icon> 
                    {% endif %}
                </h2>
                <p class="text-gray-500 text-sm flex items-center justify-center">
                    {{ deck["description"] }}
                </p>

                <div class="edit-actions hidden absolute top-2 right-2 flex gap-2">

                    <!-- Edit Deck -->
                    <button 
                        onclick="event.stopPropagation(); abrirEditar({{ deck['id'] }}, '{{ deck['name'] }}', '{{ deck['description'] }}'); return false" 
                        class="bg-yellow-400 text-white px-2 py-1 rounded text-sm">
                        <iconify-icon
                            icon="tabler:pencil"
                            width="20"
                            class="text-black transition duration-300">
                        </iconify-icon>
                    </button>

                    <!-- Excluir Deck -->
                    <form action="/deck/{{ deck['id'] }}/delete" method="POST" 
                        onclick="event.stopPropagation()"
                        onsubmit="confirmarexclusao(event)">
                        <button type="submit" class="bg-red-500 text-white px-2 py-1 rounded text-sm">
                            <iconify-icon
                                icon="mage:trash"
                                width="20"
                                class="text-black transition duration-300">
                            </iconify-icon>
                        </button>
                    </form>

                </div>
            </a>
            {% endfor %}

        </div>

        <button onclick="scrollCarousel(1)" class="text-2xl px-2 hover:text-gray-500">
            ›
        </button>

    </div>

    <div class="flex flex-col items-center p-8">
        <h2 class=" font-bold mb-4">Atividade</h2>
        <div id="heatmap" class="flex gap-1"></div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-white w-full max-w-2xl rounded-2xl shadow-xl p-6">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Novo Baralho</h2>
            <form action="/decks/new" method="POST">
                <input type="text" name="name" placeholder="Nome" class="border w-full p-2 rounded mb-3">
                <input type="text" name="description" placeholder="Descrição" class="border w-full p-2 rounded mb-4">
                
                <div class="mt-6 flex flex-col gap-2">
                    <button type="submit" 
                        class="bg-purple-600 hover:bg-purple-700 text-white 
                        font-medium py-3 rounded-xl transition">
                        Criar
                    </button>
                </div>

            </form>
            
            <div class="mt-4 flex flex-col gap-2">
                <button onclick="document.getElementById('modal').classList.add('hidden')"
                    class="border border-gray-300 hover:bg-gray-100 py-3 rounded-xl transition">
                    Cancelar
                </button>
            </div>  
            
            
        </div>
    </div>


    <div id="modal-edit" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-white w-full max-w-2xl rounded-2xl shadow-xl p-6">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Editar Baralho</h2>

            <form id="form-edit" method="POST">

                <input type="text" id="edit-name" name="name" placeholder="Nome" class="border w-full p-2 rounded mb-3">
                <input type="text" id="edit-description" name="description" placeholder="Descrição" class="border w-full p-2 rounded mb-4">

                <div class="mt-6 flex flex-col gap-2">
                    <button type="submit" 
                        class="bg-purple-600 hover:bg-purple-700 text-white 
                        font-medium py-3 rounded-xl transition">
                        Salvar
                    </button>
                </div>
            </form>
            
            <div class="mt-4 flex flex-col gap-2">
                <button onclick="document.getElementById('modal-edit').classList.add('hidden')"
                    class="border border-gray-300 hover:bg-gray-100 py-3 rounded-xl transition">
                    Cancelar
                </button>
            </div>
        </div>
    </div>

    <div id="heatmap"></div>

    <script>const HEATMAP_DATA = {{ heatmap | tojson }};</script>
    <script src="/static/homepage.js"></script>
    <script src="/static/theme.js"></script>
</body>
</html>
