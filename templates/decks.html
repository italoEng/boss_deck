<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <nav class="bg-red-500 border-b px-8 py-4">
        <a href="/">Menu</a>
        <a href='/deck/{{ deck_id }}/cards'>Iniciar</a>

    </nav>

    <form action="/deck/{{ deck_id }}/cards/new" method="POST">
        <input type="text" name="front" placeholder="Frente">
        <input type="text" name="back" placeholder="Verso">
        <button type="submit">Criar card</button>
    </form>

    <p>Total de cards: {{cards | length}}</p>

</body>
</html>
