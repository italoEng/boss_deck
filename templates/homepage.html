<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Deck</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <script src="/static/homepage.js"></script>

    <nav class="bg-red-500 border-b px-8 py-4">
        <h2>Boss Deck</h2>
        <button onclick="toggleEdit()" class="border px-4 py-2 rounded">Editar</button>
    </nav>

    <div class="grid grid-cols-4 gap-4 p-8">
        <!-- novo baralho -->
        <div onclick="document.getElementById('modal').classList.remove('hidden')" 
            class="border-2 border-dashed rounded-lg p-6 flex items-center justify-center cursor-pointer hover:bg-gray-100">
            <span class="text-4xl text-gray-400">+</span>
        </div>

        <!-- baralhos -->
        {% for deck in decks %}
        <a href='/deck/{{ deck["id"] }}' class="border rounded-lg p-12 block hover:bg-gray-100 relative">
            <h2 class="font-bold text-lg">{{ deck["name"] }}</h2>
            <p class="text-gray-500">{{ deck["description"] }}</p>
            <div class="edit-actions hidden absolute top-2 right-2 flex gap-2">
                <button onclick="event.stopPropagation()" class="bg-yellow-400 text-white px-2 py-1 rounded text-sm">✏️</button>

                <!-- Excluir Deck -->
                <form action="/deck/{{ deck['id'] }}/delete" method="POST" 
                    onclick="event.stopPropagation()"
                    onsubmit="confirmarexclusao(event)">
                    <button type="submit" class="bg-red-500 text-white px-2 py-1 rounded text-sm">🗑</button>
                </form>

            </div>
        </a>
        {% endfor %}
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
        <div class="bg-white rounded-lg p-12 w-96">
            <h2 class="font-bold text-xl mb-4">Novo Baralho</h2>
            <form action="/decks/new" method="POST">
                <input type="text" name="name" placeholder="Nome" class="border w-full p-2 rounded mb-3">
                <input type="text" name="description" placeholder="Descrição" class="border w-full p-2 rounded mb-4">
                <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded w-full">Criar</button>
            </form>
            <button onclick="document.getElementById('modal').classList.add('hidden')" 
                    class="mt-2 text-gray-500 w-full text-center">Cancelar</button>
        </div>
    </div>


</body>
</html>
